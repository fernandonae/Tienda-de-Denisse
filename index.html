<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
  <title>Punto de Venta</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    .overflow-y-auto { -webkit-overflow-scrolling: touch; }
    .product-card {
      min-height: 120px;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      border: 2px solid #fce7f3;
      transition: all 0.2s;
      cursor: pointer;
    }
    .product-card:active { transform: scale(0.95); }
    #paymentModal.hidden { display: none; }
    #paymentModal { display: flex; animation: fadeIn 0.2s ease-out; }
    @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
  </style>
</head>

<body class="bg-pink-50 h-screen flex flex-col overflow-hidden">

  <div id="paymentModal" class="hidden fixed inset-0 z-[100] bg-black/60 backdrop-blur-sm items-center justify-center p-4">
    <div class="bg-white w-full max-w-md rounded-3xl shadow-2xl overflow-hidden border-4 border-pink-500">
      <div class="bg-pink-600 p-6 text-center text-white">
        <h3 class="text-2xl font-black uppercase">Finalizar Venta</h3>
      </div>
      <div class="p-8 space-y-6">
        <div class="text-center">
          <p class="text-gray-500 font-bold uppercase text-sm">Total a Pagar</p>
          <div class="text-5xl font-black text-gray-800" id="modalTotal">$0.00</div>
        </div>
        <div class="bg-gray-50 p-6 rounded-2xl border-2 border-pink-100">
          <label class="block text-center text-pink-700 font-black mb-3 uppercase">¿Con cuánto pagan?</label>
          <div class="relative">
            <span class="absolute left-4 top-1/2 -translate-y-1/2 text-3xl font-bold text-pink-300">$</span>
            <input id="modalCashInput" type="number" step="0.01" class="w-full bg-white border-4 border-pink-200 rounded-2xl py-4 pr-4 pl-12 text-right text-4xl font-black outline-none shadow-inner" placeholder="0.00">
          </div>
        </div>
        <div class="flex justify-between items-center px-4">
          <span class="text-xl font-bold text-gray-400 font-mono italic">Su cambio:</span>
          <span id="modalChange" class="text-4xl font-black text-green-600">$0.00</span>
        </div>
        <div class="grid grid-cols-2 gap-4 pt-4">
          <button id="closeModal" class="bg-gray-100 text-gray-500 py-4 rounded-2xl font-bold">Cancelar</button>
          <button id="confirmPayment" class="bg-green-500 text-white py-4 rounded-2xl font-bold shadow-lg">✔ Confirmar</button>
        </div>
      </div>
    </div>
  </div>

  <nav class="bg-pink-600 text-white px-6 py-4 flex gap-6 shadow z-50 shrink-0">
    <button id="btnPOS" class="font-bold text-xl border-b-2 border-white">POS</button>
    <button id="btnProducts" class="opacity-80 hover:opacity-100 text-lg">Productos</button>
    <button id="btnReports" class="opacity-80 hover:opacity-100 text-lg">Reportes</button>
    <button id="btnPartners" class="opacity-80 hover:opacity-100 text-lg">Socios</button>
  </nav>

  <main class="flex-1 p-2 md:p-4 overflow-hidden relative">

    <section id="posSection" class="bg-white rounded-2xl shadow-lg grid grid-cols-1 md:grid-cols-3 h-full overflow-hidden">
      <div class="md:col-span-2 p-4 border-r flex flex-col h-full bg-gray-50 overflow-hidden">
        <h2 class="text-2xl font-bold text-gray-800 mb-3 shrink-0">🛍️ Productos</h2>
        <div class="bg-yellow-50 p-3 rounded-xl mb-3 border border-yellow-300 shrink-0">
            <div class="flex justify-between mb-1">
                <label class="text-sm font-bold text-yellow-800">💰 Venta por Dinero:</label>
                <button id="clearBulk" class="text-xs text-red-500 font-bold px-2 bg-white rounded border">Borrar</button>
            </div>
            <div class="relative">
                <span class="absolute left-4 top-1/2 -translate-y-1/2 font-bold text-xl">$</span>
                <input id="bulkMoneyInput" type="number" class="w-full pl-10 p-3 rounded-lg border-2 border-yellow-400 font-bold text-xl outline-none">
            </div>
        </div>
        <div class="flex flex-col gap-2 mb-3 shrink-0">
            <input id="search" type="text" placeholder="🔍 Buscar..." class="w-full p-4 rounded-xl border border-pink-300 text-lg outline-none" />
            <input id="barcodeInputPOS" type="text" placeholder="📲 Escanear..." class="w-full p-4 rounded-xl border-2 border-pink-400 text-lg outline-none" />
        </div>
        <div id="products" class="grid grid-cols-2 sm:grid-cols-3 lg:grid-cols-4 gap-3 overflow-y-auto pb-20 p-1"></div>
      </div>

      <div class="p-4 flex flex-col h-full bg-white z-10 border-l">
        <h2 class="text-2xl font-bold text-pink-600 mb-3 shrink-0">🧾 Ticket</h2>
        <div class="flex-1 overflow-y-auto bg-gray-50 rounded-xl border p-2 mb-3">
          <table class="w-full text-sm">
            <thead class="bg-gray-100 sticky top-0"><tr class="border-b text-gray-600"><th class="py-3 text-left pl-2">Prod</th><th class="py-3 text-right">$$</th><th class="py-3 text-center">Cant</th><th class="py-3 text-right pr-2">Total</th></tr></thead>
            <tbody id="cartTable"></tbody>
          </table>
        </div>
        <div class="bg-pink-50 p-6 rounded-3xl border-2 border-pink-100 shrink-0 shadow-lg text-center">
            <p class="text-gray-500 font-bold uppercase text-xs">Total a pagar</p>
            <div class="text-5xl font-black text-pink-600 my-2" id="total">$0.00</div>
            <button id="checkoutBtn" class="mt-4 w-full bg-pink-600 text-white py-6 rounded-2xl text-2xl font-black shadow-xl active:scale-95 transition-all">💸 COBRAR</button>
        </div>
      </div>
    </section>

    <section id="productsSection" class="hidden p-6 max-w-7xl mx-auto h-full overflow-y-auto bg-gray-50">
    <h2 class="text-3xl font-black mb-8 flex items-center gap-2 text-gray-800">
        📦 Inventario
    </h2>

    <div class="grid md:grid-cols-3 gap-10">
        <div class="bg-white p-8 rounded-3xl shadow-xl border-t-8 border-pink-500 h-fit sticky top-0">
            <h3 class="text-xl font-black text-pink-600 mb-6 flex items-center gap-2">
                📝 Editar / Crear
            </h3>

            <div class="space-y-4">
                <div>
                    <label class="block text-xs font-bold text-gray-500 uppercase ml-1 mb-1">Código de Barras</label>
                    <input id="barcodeInput" type="text" placeholder="Escanea..." class="w-full p-3 bg-gray-50 border-2 border-gray-100 rounded-xl focus:border-pink-400 outline-none transition-all"/>
                </div>

                <div>
                    <label class="block text-xs font-bold text-gray-500 uppercase ml-1 mb-1">Nombre</label>
                    <input id="nameInput" type="text" placeholder="Nombre producto" class="w-full p-3 bg-gray-50 border-2 border-gray-100 rounded-xl focus:border-pink-400 outline-none transition-all" />
                </div>

                <div class="grid grid-cols-2 gap-4">
                    <div>
                        <label class="block text-xs font-bold text-gray-500 uppercase ml-1 mb-1">Precio</label>
                        <input id="priceInput" type="number" step="0.01" placeholder="0.00" class="w-full p-3 bg-gray-50 border-2 border-gray-100 rounded-xl focus:border-pink-400 outline-none transition-all" />
                    </div>
                    <div>
                        <label class="block text-xs font-bold text-gray-500 uppercase ml-1 mb-1">Stock</label>
                        <input id="stockInput" type="number" placeholder="0" class="w-full p-3 bg-gray-50 border-2 border-gray-100 rounded-xl focus:border-pink-400 outline-none transition-all" />
                    </div>
                </div>

                <div>
                    <label class="block text-xs font-bold text-gray-500 uppercase ml-1 mb-1">Tags</label>
                    <input id="tagsInput" type="text" placeholder="Ej: m, p, abarrotes" class="w-full p-3 bg-gray-50 border-2 border-gray-100 rounded-xl focus:border-pink-400 outline-none transition-all" />
                </div>

                <button id="addProduct" class="w-full mt-4 bg-pink-600 hover:bg-pink-700 text-white py-4 rounded-2xl font-black text-lg shadow-lg active:scale-95 transition-all">
                    Guardar Producto
                </button>
            </div>
        </div>

        <div class="md:col-span-2">
            <h3 class="text-xl font-black text-gray-700 mb-4">Lista de Productos</h3>
            
            <div class="relative mb-6">
                <span class="absolute inset-y-0 left-4 flex items-center text-pink-500">
                    🔍
                </span>
                <input id="inventorySearch" type="text" placeholder="Buscar por nombre o código..." class="w-full pl-12 pr-4 py-3 bg-white border-2 border-gray-100 rounded-2xl shadow-sm focus:border-pink-400 outline-none transition-all"/>
            </div>

            <div id="productList" class="space-y-3">
                </div>
        </div>
    </div>
</section>
<section id="reportsSection" class="hidden max-w-4xl mx-auto mt-4 h-full overflow-y-auto">
        <h2 class="text-3xl font-bold mb-6 text-center font-bold">📊 Reportes</h2>
        
        <div class="mb-6 px-4">
            <button onclick="exportarExcel()" class="w-full bg-green-600 hover:bg-green-700 text-white py-4 rounded-2xl font-black shadow-lg transition-all flex items-center justify-center gap-2">
                Excel / Descargar Todo el Historial 📥
            </button>
        </div>

        <div class="grid md:grid-cols-2 gap-6 p-4">
            <div class="bg-white p-6 rounded-xl shadow border-t-4 border-pink-500">
                <button id="btnReporteDia" class="w-full bg-pink-100 py-2 rounded-lg font-bold">Ver Hoy</button>
                <div id="resultadoDia" class="mt-4 hidden"></div>
            </div>

            <div class="bg-white p-6 rounded-xl shadow border-t-4 border-purple-500">
                <div class="flex gap-2 mb-2">
                    <input type="date" id="startDate" class="border p-1 w-1/2 rounded">
                    <input type="date" id="endDate" class="border p-1 w-1/2 rounded">
                </div>
                <button id="btnReporteRango" class="w-full bg-purple-100 py-2 rounded-lg font-bold">Consultar</button>
                <div id="resultadoRango" class="mt-4 hidden"></div>
            </div>
        </div>
    </section>

    <div id="partnersSection" class="hidden w-full p-6 max-w-2xl mx-auto h-full overflow-y-auto">
        <div class="bg-white p-6 rounded-2xl shadow mb-8">
            <h2 class="text-2xl font-bold mb-4">👥 Socios</h2>
            <div class="flex gap-2 mb-2"><input id="partnerName" type="text" placeholder="Nombre" class="flex-1 p-2 border rounded"/><input id="partnerTag" type="text" placeholder="Tag" class="w-24 p-2 border rounded"/></div>
            <button id="addPartner" class="w-full bg-gray-800 text-white py-2 rounded font-bold">Agregar</button>
        </div>
        <div id="partnerList" class="space-y-2"></div>
    </div>

  </main>

  <input type="hidden" id="cashInput" value="0">

  <script src="js/app.js"></script>
  
  <script>
    (function() {
        const modal = document.getElementById('paymentModal');
        const btnAbrir = document.getElementById('checkoutBtn');
        const btnCerrar = document.getElementById('closeModal');
        const btnConfirmar = document.getElementById('confirmPayment');
        const inputPago = document.getElementById('modalCashInput');
        const txtCambio = document.getElementById('modalChange');
        const txtTotalM = document.getElementById('modalTotal');
        const txtTotalP = document.getElementById('total');
        const hiddenCash = document.getElementById('cashInput');

        btnAbrir.addEventListener('click', () => {
            const t = txtTotalP.innerText;
            if (parseFloat(t.replace('$', '')) <= 0) return;
            txtTotalM.innerText = t;
            inputPago.value = '';
            txtCambio.innerText = '$0.00';
            modal.classList.remove('hidden');
            setTimeout(() => inputPago.focus(), 200);
        });

        inputPago.addEventListener('input', () => {
            const tot = parseFloat(txtTotalM.innerText.replace('$', '')) || 0;
            const pag = parseFloat(inputPago.value) || 0;
            const cam = pag - tot;
            txtCambio.innerText = cam > 0 ? `$${cam.toFixed(2)}` : '$0.00';
            inputPago.style.borderColor = pag >= tot ? '#22c55e' : '#f472b6';
        });

        btnCerrar.addEventListener('click', () => modal.classList.add('hidden'));

        btnConfirmar.addEventListener('click', () => {
            const tot = parseFloat(txtTotalM.innerText.replace('$', '')) || 0;
            const pag = parseFloat(inputPago.value) || 0;
            if (pag < tot) { alert("Pago insuficiente"); return; }
            
            // Pasamos el valor al input que app.js espera
            hiddenCash.value = pag;
            modal.classList.add('hidden');
            
            // IMPORTANTE: Disparamos manualmente el evento de cobrar si app.js no lo hace solo
            console.log("Venta procesada");
        });
    })();
  </script>
</body>
</html>
